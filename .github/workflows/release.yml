name: Release

on:
  push:
    tags:
      - "v[1-9]*"   # only v1.0.0 and above — v0.x.x milestone tags are skipped

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build / ${{ matrix.artifact }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: nodevia-agent-amd64
          - target: aarch64-unknown-linux-gnu
            artifact: nodevia-agent-arm64
          - target: armv7-unknown-linux-gnueabihf
            artifact: nodevia-agent-armv7

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Downloads a pre-built cross binary — much faster than cargo install
      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --target ${{ matrix.target }} --release

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/nodevia-agent ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
